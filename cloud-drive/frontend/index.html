<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Cloud Drive</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.file {
    padding: 10px;
    border: 1px solid #ddd;
    margin-top: 8px;
    border-radius: 8px;
}

.folder {
    background: #e8f0fe;
}

button {
    margin: 3px;
    cursor: pointer;
}

.topbar {
    display:flex;
    justify-content:space-between;
}
</style>

</head>

<body>

<div class="container">

<h2>📁 Cloud Drive</h2>

<div class="topbar">
    <div>📍 <span id="path"></span></div>
    <button onclick="back()">🔙 返回</button>
</div>

<hr>

<h3>📤 上傳</h3>

<input type="file" id="fileInput" multiple>
<input type="file" id="folderInput" webkitdirectory multiple>
<button onclick="upload()">上傳</button>

<hr>

<h3>📁 檔案列表</h3>
<div id="list"></div>

</div>

<script>

const API = ""; // ✅ 重點：Render 用同網域

let currentPath = "";

// 📍 更新路徑
function updatePath() {
    document.getElementById("path").innerText = "/" + (currentPath || "");
}


// 📁 載入資料
async function load() {

    updatePath();

    const res = await fetch(`/list?path=${currentPath}`);
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    // 📁 folders
    data.folders.forEach(name => {

        const full = currentPath ? currentPath + "/" + name : name;

        const div = document.createElement("div");
        div.className = "file folder";

        div.innerHTML = `
            📁 ${name}
            <br>
            <button onclick="openFolder('${full}')">開啟</button>
            <button onclick="del('${full}')">刪除資料夾</button>
        `;

        list.appendChild(div);
    });

    // 📄 files
    data.files.forEach(name => {

        const full = currentPath ? currentPath + "/" + name : name;

        const div = document.createElement("div");
        div.className = "file";

        div.innerHTML = `
            📄 ${name}
            <br>
            <a href="/download?path=${full}" target="_blank">下載</a>
            <button onclick="del('${full}')">刪除</button>
        `;

        list.appendChild(div);
    });
}


// 📂 開資料夾
function openFolder(path) {
    currentPath = path;
    load();
}


// 🔙 返回
function back() {
    if (!currentPath) return;

    let parts = currentPath.split("/");
    parts.pop();
    currentPath = parts.join("/");
    load();
}


// 📤 上傳（🔥 已修好）
async function upload() {

    const files = [
        ...document.getElementById("fileInput").files,
        ...document.getElementById("folderInput").files
    ];

    const formData = new FormData();

    for (let f of files) {
        formData.append("files", f);
    }

    await fetch("/upload", {
        method: "POST",
        body: formData
    });

    load();
}


// ❌ 刪除
async function del(path) {

    await fetch("/delete?path=" + path, {
        method: "DELETE"
    });

    load();
}

load();

</script>

</body>
</html>
